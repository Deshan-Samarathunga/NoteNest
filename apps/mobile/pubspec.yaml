name: notenest_mobile
description: Flutter mobile app for NoteNest.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_local_notifications: ^18.0.1
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  http_parser: ^4.0.2
  image_picker: ^1.1.2
  intl: ^0.20.1
  path: ^1.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4
  sqflite: ^2.4.1
  timezone: ^0.10.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
